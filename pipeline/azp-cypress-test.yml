# Pipeline de execução no Azure

trigger: none

pool:
  vmImage: ubuntu-latest

# Set variables once
variables:
  - group: cypress-variables-seu-barriga
  # - name: TRIGGER_BRANCH
  #   value: $(resources.pipeline.app-delivery.sourceBranch) # pipeline que dispara a trigger
  - name: DASHBOARD_TESTS_RESULT
    value: "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)&view=ms.vss-test-web.build-test-results-tab"
  - name: PIPELINE_TEST
    value: "$(Build.DefinitionName) $(Build.BuildId)"
  - name: TELEGRAM_POST
    value: https://api.telegram.org/$TELEGRAM_BOT_ID/sendMessage
  - name: TELEGRAM_URL_GROUP
    value: "https://web.telegram.org/k/#$(TELEGRAM_WEB_URL)"
  - name: TERM # evita warning no log no ci do cypress
    value: xterm

parameters:  
  - name: RUN_ON_QA
    displayName: "Rodar em ambiente QA"
    type: boolean
    default: false
  - name: overrideFileRun
    displayName: "Execução manual - File to Run (opcional)"
    type: string
    default: ' '

# A trigger será disparada para a branch master do reposítório de teste.
# O ambiente que será executado (master ou qa) dependerá do artefato publicado pela pipeline anterior
# É necessário a tag para execuções via cron
# resources:
#   pipelines:
#   - pipeline: app-delivery
#     source: app-delivery # nome da pipeline referenciada pela resource
#     trigger:
#       tags:        # filtro usado para disparar está pipeline
#       - trigger-cypress-test
#       branches:
#         include: 
#         - refs/heads/qa
#         - refs/heads/master

stages:
  - stage: Test
    jobs:
      - job: CypressE2ETests
        displayName: "Matrix - Run E2E Cypress Tests"
        # container: cypress/browsers:latest # Use latest no version number
        # browser:  chrome, possível definir em uma matrix mais de um browser, depois deve ser passado o browser no npx run e reports
        #           quando existir publicação de resultados, deve ser passado o nome do browser no publish
        #           cada browser executará a mesma quantidade de teste que estiverem no specPattern
        strategy:
          matrix: # cada groupName vai executar os arquivos que respeitem o specPattern
            backend:
              groupName: backend
              specPattern: "cypress/e2e/**/*-backend.cy.ts"
            frontend:
              groupName: frontend
              specPattern: "cypress/e2e/**/*-frontend.cy.ts"
        steps:
          - task: UseNode@1
            displayName: "Define Node version"
            inputs:
              version: '24.x'

          - task: Bash@3
            displayName: 'Install ts-node globally'
            inputs:
              targetType: 'inline'
              script: npm install -g ts-node typescript

          - task: Bash@3
            displayName: 'Install npm dependencies'
            inputs:
              targetType: 'inline'
              script: npm install --force
                
          - task: CacheBeta@1
            displayName: Cache npm packages
            inputs:
              key: npm | $(Agent.OS) | package-lock.json
              path: /home/vsts/.npm
              restoreKeys: npm | $(Agent.OS) | package-lock.json

          - task: CacheBeta@1
            displayName: Cache Cypress binary
            inputs:
              key: cypress | $(Agent.OS) | package-lock.json
              path: /home/vsts/.cache/Cypress
              restoreKeys: cypress | $(Agent.OS) | package-lock.json
  
          - task: Bash@3
            displayName: 'Install npm dependencies'
            inputs:
              targetType: 'inline'
              script: npm ci --prefer-offline

          - task: Bash@3
            displayName: 'Cypress verify'
            inputs:
              targetType: 'inline'
              script: npm run cy:verify
              
          - task: CmdLine@2
            displayName: 'Debug - Print Variables'
            inputs:
              script: |
                echo "⚙️ Debug variables ⚙️"
                echo "Pipeline.Workspace = $(Pipeline.Workspace)"
                echo "BUILD_BUILDNUMBER = $BUILD_BUILDNUMBER"
                # echo "Trigger disparada a partir da branch: $(TRIGGER_BRANCH)"
                echo "Reason: $(Build.Reason)"
                echo "SourceBranchName: $(Build.SourceBranchName)"
                echo "NOTIFY = $(NOTIFY)"
                echo "NOTIFY_ON = $(NOTIFY_ON)"
                echo "NOTIFY_ON_SUCCESS = $(NOTIFY_ON_SUCCESS)"
                echo "NOTIFY_ERR_TELEGRAM_SCHEENSHOT = $(NOTIFY_ERR_TELEGRAM_SCHEENSHOT)"
                echo "NOTIFY_ERR_TELEGRAM_VIDEO = $(NOTIFY_ERR_TELEGRAM_VIDEO)"
                echo "AZURE_DEVOPS_PAT = $(AZURE_DEVOPS_PAT)"
                echo "Build.BuildId: $(Build.BuildId)"
                echo "Build.BuildNumber: $(Build.BuildNumber)"
                echo "groupName: $(groupName)"
                echo "Node Version: "
                node -v
                echo "specPattern: $(specPattern)"
                echo "overrideFileRun: ${{ parameters.overrideFileRun }}"
                
          # por motivos de boas práticas deve ser definido uma baseUrl para o cypress, 
          # por padrão o da master por isso apenas o qa deve ser trocado a baseUrl e url da api
          #
          # and(eq(variables['TRIGGER_BRANCH'], 'refs/heads/qa'), eq(variables['Build.Reason'], 'ResourceTrigger'))
          - task: Bash@3  # roda no QA
            displayName: 'QA - Cypress E2E tests'
            condition: eq('${{ parameters.RUN_ON_QA }}', 'true')
            inputs:
              targetType: 'inline'
              script: | 
                echo "🔥🚀 QA - Executando testes..."
                echo "O baseUrl será configurado para usar o valor: $(baseUrl_QA)"

                export CYPRESS_BASE_URL_API=$(BASE_URL_API)
                export CYPRESS_BASE_URL_QA=$(BASE_URL_QA)
                
                export CYPRESS_SEU_BARRIGA_USERNAME=$(SEU_BARRIGA_USERNAME)
                export CYPRESS_SEU_BARRIGA_EMAIL=$(SEU_BARRIGA_EMAIL)
                export CYPRESS_SEU_BARRIGA_PASSWD=$(SEU_BARRIGA_PASSWD)
                
                export CYPRESS_RECORD_KEY=$(RECORD_KEY)
                export CYPRESS_NOTIFY=$(NOTIFY)
                export CYPRESS_NOTIFY_ON=$(NOTIFY_ON)
                export CYPRESS_NOTIFY_ON_SUCCESS=$(NOTIFY_ON_SUCCESS)
                
                export CYPRESS_NOTIFY_ERR_TELEGRAM_SCHEENSHOT=$(NOTIFY_ERR_TELEGRAM_SCHEENSHOT)
                export CYPRESS_NOTIFY_ERR_TELEGRAM_VIDEO=$(NOTIFY_ERR_TELEGRAM_VIDEO)
                export CYPRESS_TELEGRAM_BOT_ID=$(TELEGRAM_BOT_ID)
                export CYPRESS_TELEGRAM_CHAT_ID=$(TELEGRAM_CHAT_ID)

                export CYPRESS_AZURE_DEVOPS_PAT=$(AZURE_DEVOPS_PAT)

                npx cypress run \
                  --spec "$(specPattern)" \
                  --config baseUrl=$(baseUrl_QA) \
                  --headless 
# --browser chrome \                  

# and(eq(variables['TRIGGER_BRANCH'], 'refs/heads/master'), eq(variables['Build.Reason'], 'ResourceTrigger'))
          - task: Bash@3
            displayName: 'Master - Cypress E2E tests'
            condition: and(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.RUN_ON_QA }}', 'false'))
            inputs:
              targetType: 'inline'
              script: |
                echo "🔥🚀 Master Executando testes..."

                export CYPRESS_BASE_URL_API=$(BASE_URL_API)
                export CYPRESS_BASE_URL_QA=$(BASE_URL_QA)
                
                export CYPRESS_SEU_BARRIGA_USERNAME=$(SEU_BARRIGA_USERNAME)
                export CYPRESS_SEU_BARRIGA_EMAIL=$(SEU_BARRIGA_EMAIL)
                export CYPRESS_SEU_BARRIGA_PASSWD=$(SEU_BARRIGA_PASSWD)
                
                export CYPRESS_RECORD_KEY=$(RECORD_KEY)
                export CYPRESS_NOTIFY=$(NOTIFY)
                export CYPRESS_NOTIFY_ON=$(NOTIFY_ON)
                export CYPRESS_NOTIFY_ON_SUCCESS=$(NOTIFY_ON_SUCCESS)
                
                export CYPRESS_NOTIFY_ERR_TELEGRAM_SCHEENSHOT=$(NOTIFY_ERR_TELEGRAM_SCHEENSHOT)
                export CYPRESS_NOTIFY_ERR_TELEGRAM_VIDEO=$(NOTIFY_ERR_TELEGRAM_VIDEO)
                export CYPRESS_TELEGRAM_BOT_ID=$(TELEGRAM_BOT_ID)
                export CYPRESS_TELEGRAM_CHAT_ID=$(TELEGRAM_CHAT_ID)

                export CYPRESS_AZURE_DEVOPS_PAT=$(AZURE_DEVOPS_PAT)

                npx cypress run \
                  --spec "$(specPattern)" \
                  --headless

# --browser chrome \                   

# npx cypress run --record --key $(CYPRESS_RECORD_KEY) --parallel --ci-build-id $BUILD_BUILDNUMBER --env... # run on cypress cloud

# Publica o resultados de todos os testes, de todas as matrices -  É possível publicar separado os relatórios com o $(groupName)                  

          - task: Bash@3
            displayName: 'Generate documentation.md'
            condition: and(
              eq(variables['PUBLISH_DOC'], 'true'),
              or(
                eq(variables['groupName'], 'backend'),
                eq(variables['Build.Reason'], 'Manual'),
                eq(variables['Build.Reason'], 'Schedule')
              ))
            inputs:
              targetType: 'inline'
              script: |
                echo "🛠️ Gerando documentação markdown, para publicação posterior"
                ts-node cypress/scripts/generate-md.ts

          - task: Bash@3
            displayName: 'Debug - List report files'
            condition: succeededOrFailed()
            inputs:
              targetType: 'inline'
              script: |
                echo "📂 Current directory:"
                pwd

                echo ""
                echo "📂 System.DefaultWorkingDirectory:"
                echo "$(System.DefaultWorkingDirectory)"

                echo ""
                echo "📂 Listando arquivos do workspace:"
                find $(System.DefaultWorkingDirectory) -type f | sort

                echo ""
                echo "📂 Listando pasta cypress/results:"
                ls -lah $(System.DefaultWorkingDirectory)/cypress/results || true
                
          - task: PublishTestResults@2  # publica o relatório xml para visualização da aba test no azure
            displayName: 'Publish Tests results'
            continueOnError: true
            condition: succeededOrFailed()
            inputs:
              searchFolder: '$(System.DefaultWorkingDirectory)'
              testResultsFiles: 'cypress/results/*.xml'
              testResultsFormat: 'JUnit'
              mergeTestResults: true
              failTaskOnFailedTests: false
              failTaskOnFailureToPublishResults: true
              failTaskOnMissingResultsFile: true

# pública o arquivo after_run-results.json, gerado no cypress, no cypress.config.ts > 'after:run'
          - task: PublishBuildArtifacts@1
            displayName: "Publica after_run-results.json" # arquivo com resultados de testes para notificações
            condition: succeededOrFailed()
            inputs:
              PathtoPublish: "$(System.DefaultWorkingDirectory)/cypress/fixtures/geral/tmp/monitoramento/after_run-results.json"
              ArtifactName: "afterRunResults"
              publishLocation: "Container"
          
          # O processo de documentação pode ser ignorado, mudando a variable PUBLISH_DOC da library
          # 
          # Processo: 
          # Encontra os testes de api, gerador pela task saveApiDoc();
          # Publica a documentação, organizados conforme definido no path do saveApiDoc().
          - task: Bash@3
            displayName: "Wiki Documentation"
            condition: and(
              succeededOrFailed(),
              eq(variables['PUBLISH_DOC'], 'true'),
              eq(variables['groupName'], 'backend')
              )
            inputs:
              targetType: 'inline'
              script: |
                echo "📚 Publicando documentação na Wiki do Azure, gerada em teste anterior..."
                
                if [ -z "$WIKI_API_NAME" ] || [ -z "$WIKI_API_VERSION" ] || [ -z "$WIKI_IDENTIFIER" ]; then
                  # -z = variável vazia ou não definida
                  echo "❌ ERRO = Variáveis obrigatórias não informadas!"
                  echo "WIKI_API_NAME=$WIKI_API_NAME"
                  echo "WIKI_API_VERSION=$WIKI_API_VERSION"
                  echo "WIKI_IDENTIFIER=$WIKI_IDENTIFIER"
                  
                  exit 1
                fi

                CY_ROOT_DOCS_PATH="cypress/results/doc" # onde deve ser encontrado os documentos

                # A necessidade de ter que tratar a URL aqui, e não ter deixado ela completa nas library é porque o POST para a pasta principal e sub-pastas são diferentes
                WIKI_URL_APIS="$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_apis/wiki/wikis/$(WIKI_IDENTIFIER).wiki"  # URL da _apis Wiki
                WIKI_API_VERSION="$(WIKI_API_VERSION)"
                WIKI_IDENTIFIER="$(WIKI_IDENTIFIER)"

                # debug
                echo "⚙️ Debug variables ⚙️"
                echo "CY_ROOT_DOCS_PATH = $CY_ROOT_DOCS_PATH"
                echo "WIKI_URL_APIS = $WIKI_URL_APIS"

                # verifica se existe documento para publicar
                # -d: é um diretório?
                if [ -d "$CY_ROOT_DOCS_PATH" ]; then
                  echo "👉 Documentos da pasta /doc:"
                  ls -la "$CY_ROOT_DOCS_PATH"
                else
                  echo "❌ Erro na publicação de documentos, o repositório /doc não foi encontrado = $CY_ROOT_DOCS_PATH"
                  exit 1
                fi
                
                # debug - imprime todos os arquivos markdown na pasta de documentos
                # echo "Arquivos .md >>>"
                # find "$CY_ROOT_DOCS_PATH" -type f -name "*.md"
                
                echo "----------------INIT DOC --------------------------"
                echo "📚 Processo de publicação de documentos..."
                
                # Para Azure DevOps - evita process substitution completamente - no final do while, é inserido no done <
                # O find não pode ficar com o while porque eu preciso pegar a URL da Wiki, depois de publicada, não no while
                # evita subshell
                find "$CY_ROOT_DOCS_PATH" -type f -name "*.md" > /tmp/wiki_files.txt
                
                # Itera nos arquivos.md de documentação, para publicar
                while read -r file; do
                  echo "👉 Enviando arquivo = $file"

                  
                  RELATIVE_PATH=$(echo "$file" | sed "s|$CY_ROOT_DOCS_PATH||" | sed 's|.md$||')
                  WIKI_PATH="$(WIKI_API_NAME)/${RELATIVE_PATH#/}"
                  
                  echo "👉 Publicar arquivo do path = $WIKI_PATH"

                  # faz um split por '/'
                  IFS='/' read -ra SPLIT_PATH <<< "${WIKI_PATH#/}"

                  CURRENT_PATH=""
                  NUM_SPLIT=${#SPLIT_PATH[@]}

                  # itera nos arquivos criados do split/ para criar as pastas principais e conteúdos das pastas
                  for i in "${!SPLIT_PATH[@]}"; do

                    CURRENT_PATH="$CURRENT_PATH/${SPLIT_PATH[i]}"                    

                    # Verifica se existe a pasta principal, cria caso não exista
                    if [ $i -lt $((NUM_SPLIT - 1)) ]; then
                      echo "[${SPLIT_PATH[i]}] 👉 Pasta sendo considerada = $CURRENT_PATH"

                      # trata espaços, caracteres especiais, encoding em geral
                      SAFE_PATH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$CURRENT_PATH'''))")

                      # monta a URL para criação da pasta principal
                      PUT_URL="$WIKI_URL_APIS/pages?path=$SAFE_PATH&api-version=$WIKI_API_VERSION"
                      echo "🔗 PUT_URL = $PUT_URL"

                      # Verifico se a pasta principal já existe
                      responseExists=$(curl -s -o /tmp/curl_response.json -w "%{http_code}" \
                        --max-time 60 \
                        -X PUT \
                        -u ":$(AZURE_DEVOPS_PAT)" \
                        -H "Content-Type: application/json" \
                        -d '{}' \
                        "$PUT_URL")

                      # responsePrincipal
                      echo "👉 Status - Pasta existente? = $responseExists"

                      if [ "$responseExists" -eq 500 ]; then
                        # Existe a pasta pai
                        echo "👉 Página pai já existe, pulando..."

                      elif [ "$key" = "base_url_api" ]; then
                        # Não existe a pasta pai
                        echo "👉 Será criado uma nova pasta = $CURRENT_PATH"
                        
                        PUT_URL="$WIKI_URL_APIS/pages?path=$SAFE_PATH&api-version=$WIKI_API_VERSION"
                        
                        status_new_pai=$(curl -s -o /tmp/curl_response.json -w "%{http_code}" --max-time 60 -X PUT \
                          -u :$(AZURE_DEVOPS_PAT) \
                          -H "Content-Type: application/json" \
                          -d "{\"content\": \"\"}" \
                          "$PUT_URL")

                        echo "👉 Status da nova pasta criada = $status_new_pai"
                      fi
                    fi
                  done

                  # trata aspas, quebra de linha, encoding
                  CONTENT=$(jq -Rs . < "$file")
                  # trata espaços, caracteres especiais, encoding em geral
                  PUT_URL="$WIKI_URL_APIS/pages?path=$SAFE_PATH&api-version=$WIKI_API_VERSION"

                  echo "👉 Criando/Atualizando página filho = $WIKI_PATH"
                  echo "🔗 PUT_URL = $PUT_URL"

                  # Faz uma requisição GET para a pasta que se pretende publicar, caso exista a pasta, o etag será preenchido
                  # -D: imprime headers da resposta no stdout
                  etag=$(curl -s -D - \
                    -u :$(AZURE_DEVOPS_PAT) \
                    "$PUT_URL" | grep -i ETag | awk '{print $2}' | tr -d '\r') # Filtra apenas a linha que contém o ETag,  segunda linha (awk '{print $2}')
                  
                  # -s: não mostra barra de progresso)
                  # -o /tmp/curl_response.json - response em um arquivo temporario
                  # -w "%{http_code}" - pega apenas o status code
                  if [ -z "$etag" ]; then #se $etag vazia - a pasta não existe
                    echo "👉 Página não existe, criando..."

                    status_final_file=$(curl -s -o /tmp/curl_response.json -w "%{http_code}" --max-time 60 -X PUT \
                      -u :$(AZURE_DEVOPS_PAT) \
                      -H "Content-Type: application/json" \
                      -d "{\"content\": $CONTENT}" \
                      "$PUT_URL")

                  else
                    echo "🔄 Página existe, atualizando..."

                    status_final_file=$(curl -s -o /tmp/curl_response.json -w "%{http_code}" --max-time 60 -X PUT \
                      -u :$(AZURE_DEVOPS_PAT) \
                      -H "Content-Type: application/json" \
                      -H "If-Match: $etag" \
                      -d "{\"content\": $CONTENT}" \
                      "$PUT_URL")
                  fi
                  
                  echo "----------------END DOC --------------------------"

                  body=$(cat /tmp/curl_response.json)

                  echo "Status code final = $status_final_file"
                  
                  if [ "$status_final_file" -ne 200 ] && [ "$status_final_file" -ne 201 ]; then
                    echo "❌  Erro ao publicar página"

                    echo "Response body final =  $body"

                    echo "👉 /tmp files:"
                    ls /tmp

                    echo "👉 curl_response.json"
                    cat /tmp/curl_response.json

                    echo "👉 wiki_files.tx"
                    cat /tmp/wiki_files.txt

                    exit 1

                  fi

                  WIKI_URL_AZURE=$(echo "$body" | jq -r '.remoteUrl') # URL da documentação publicada

                  echo "✅ Documentação atualiza com sucesso!"  
                  echo "🔗 $WIKI_URL_AZURE"

                done < /tmp/wiki_files.txt

                echo "##vso[task.setvariable variable=WIKI_URL_AZURE;isOutput=true]$WIKI_URL_AZURE"
            name: documentationAPI

      - job: successNotifyTestResults
        displayName: "Successo - Notificação"
        condition: and(succeeded(), and(eq(variables['NOTIFY'], 'true'), eq(variables['NOTIFY_ON_SUCCESS'], 'true')))
        dependsOn: CypressE2ETests # do job
        steps:
          - task: DownloadBuildArtifacts@1
            displayName: "Baixa after_run-results.json" # baixa dados de testes, publicado em job anterior
            inputs:
              buildType: current
              downloadType: single
              artifactName: "afterRunResults"
              downloadPath: "$(System.DefaultWorkingDirectory)"

          - task: Bash@3
            displayName: "Telegram"
            condition: eq(variables['NOTIFY_ON'], 'TELEGRAM')
            inputs:
              targetType: 'inline'
              script: | 
                echo "👉 Notificará sucesso..."

                # Valida variáveis required para o fluxo
                if [ -z "$TELEGRAM_BOT_ID" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
                  # -z = variável vazia ou não definida
                  echo "❌ ERRO = Variáveis obrigatórias não informadas!"
                  echo "TELEGRAM_BOT_ID=$TELEGRAM_BOT_ID"
                  echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID"
                  exit 1
                fi

                echo "⚙️ Debug variables ⚙️" 

                echo "TELEGRAM_CHAT_ID = $TELEGRAM_CHAT_ID"
                echo "TELEGRAM_BOT_ID = $TELEGRAM_BOT_ID"
                echo "TELEGRAM_POST = $TELEGRAM_POST"
                echo "DASHBOARD_TESTS_RESULT = $(DASHBOARD_TESTS_RESULT)"
                echo "TEST_RUN_URL = $$TEST_RUN_URL"
                # extrai variáveis
                CY_RESULTS_FILE_PATH="$(System.DefaultWorkingDirectory)/afterRunResults/after_run-results.json"

                if [ ! -s "$CY_RESULTS_FILE_PATH" ]; then
                  echo "❌ Arquivo $CY_RESULTS_FILE_PATH não encontrado ou vazio!"
                  ls -lah "$(dirname "$CY_RESULTS_FILE_PATH")"
                  exit 1
                fi

                # itera sobre o results.json e atribui valor às variáveis
                for key in $(jq -r 'keys[]' "$CY_RESULTS_FILE_PATH"); do
                  value=$(jq -r --arg k "$key" '.[$k]' "$CY_RESULTS_FILE_PATH")

                  if [ "$key" = "baseUrl" ]; then
                    baseUrl="$value"
                  elif [ "$key" = "base_url_api" ]; then
                    base_url_api="$value"
                  elif [ "$key" = "endedTestsAt" ]; then
                    endedTestsAt="$value"
                  elif [ "$key" = "totalDuration" ]; then
                    totalDuration="$value"
                  elif [ "$key" = "totalPassed" ]; then
                    totalPassed="$value"
                  elif [ "$key" = "totalFailed" ]; then
                    totalFailed="$value"
                  elif [ "$key" = "totalSuites" ]; then
                    totalSuites="$value"
                  elif [ "$key" = "totalTests" ]; then
                    totalTests="$value"
                  elif [ "$key" = "osName" ]; then
                    osName="$value"
                  elif [ "$key" = "cypressVersion" ]; then
                    cypressVersion="$value"
                  elif [ "$key" = "browserName" ]; then
                    browserName="$value"
                  elif [ "$key" = "browserVersion" ]; then
                    browserVersion="$value"
                  fi
                done
                
                echo "⚙️ Debug variables ⚙️" 

                echo "baseUrl = $baseUrl"
                echo "base_url_api = $base_url_api"
                echo "endedTestsAt = $endedTestsAt"
                echo "totalDuration = $totalDuration"
                echo "totalPassed = $totalPassed"
                echo "totalFailed = $totalFailed"
                echo "totalSuites = $totalSuites"
                echo "totalTests = $totalTests"
                echo "osName = $osName"
                echo "cypressVersion = $cypressVersion"
                echo "browserName = $browserName"
                echo "browserVersion = $browserVersion"

                echo "🚀 Enviando mensagem..."
                
                 response=$(curl -s -w "\n%{http_code}" -X POST "$(TELEGRAM_POST)" \
                    -H "Content-Type: application/json" \
                    -d '{
                        "chat_id": "$(TELEGRAM_CHAT_ID)",
                        "parse_mode": "HTML",
                        "text": "✅ <b>Testes executados com sucesso!</b>\
                    🧪 <b>Framework:</b> Cypress '"$cypressVersion"'\
                    🖥️ <b>Navegador:</b> '"$browserName"' - '"$browserVersion"'\
                    🌐 <b>Servidor:</b> '"$baseUrl"'\
                    📡 <b>API:</b> '"${base_url_api:-N/A}"'\
                    🔁 <b>Pipeline:</b> $(Build.DefinitionName) $(Build.BuildId)\
                    📊 <b>Testes executados:</b> '"$totalSuites"' Suites - '"$totalTests"' Testes\
                    📅 <b>Executado em:</b> '"$endedTestsAt"'\
                    📈 <a href=\"$(DASHBOARD_TESTS_RESULT)\">Results Dashboard</a>"
                    }'
                    )

                responseBody=$(echo "$response" | sed '$d')
                status_code=$(echo "$response" | tail -n1)

                echo "Status Code: $status_code"

                if [ "$status_code" -ne 200 ]; then
                  echo "❌ Erro ao enviar mensagem para o Teams"
                  echo "Response body:"
                  echo "$responseBody"
                  exit 1
                else
                  echo "✅ Mensagem enviada com sucesso!"
                fi
                
          - task: Bash@3
            displayName: "Teams"
            condition: eq(variables['NOTIFY_ON'], 'TEAMS')
            inputs:
              targetType: 'inline'
              script: | 
                echo "Notificando sucesso..."
                
                echo "TEAMS_URL = $(TEAMS_URL)"
                echo "DASHBOARD_TESTS_RESULT = $(DASHBOARD_TESTS_RESULT)"

                # extrai variáveis
                CY_RESULTS_FILE_PATH="$(System.DefaultWorkingDirectory)/afterRunResults/after_run-results.json"

                if [ ! -s "$CY_RESULTS_FILE_PATH" ]; then
                  echo "Arquivo $CY_RESULTS_FILE_PATH não encontrado ou vazio!"
                  ls -lah "$(dirname "$CY_RESULTS_FILE_PATH")"
                  exit 1
                fi

                # itera sobre o results.json e atribui valor às variáveis
                for key in $(jq -r 'keys[]' "$CY_RESULTS_FILE_PATH"); do
                  value=$(jq -r --arg k "$key" '.[$k]' "$CY_RESULTS_FILE_PATH")

                  if [ "$key" = "baseUrl" ]; then
                    baseUrl="$value"
                  elif [ "$key" = "base_url_api" ]; then
                    base_url_api="$value"
                  elif [ "$key" = "endedTestsAt" ]; then
                    endedTestsAt="$value"
                  elif [ "$key" = "totalDuration" ]; then
                    totalDuration="$value"
                  elif [ "$key" = "totalPassed" ]; then
                    totalPassed="$value"
                  elif [ "$key" = "totalFailed" ]; then
                    totalFailed="$value"
                  elif [ "$key" = "totalSuites" ]; then
                    totalSuites="$value"
                  elif [ "$key" = "totalTests" ]; then
                    totalTests="$value"
                  elif [ "$key" = "osName" ]; then
                    osName="$value"
                  elif [ "$key" = "cypressVersion" ]; then
                    cypressVersion="$value"
                  elif [ "$key" = "browserName" ]; then
                    browserName="$value"
                  elif [ "$key" = "browserVersion" ]; then
                    browserVersion="$value"
                  fi
                done

                echo "⚙️ Debug variables ⚙️" 
                
                echo "baseUrl = $baseUrl"
                echo "base_url_api = $base_url_api"
                echo "endedTestsAt = $endedTestsAt"
                echo "totalDuration = $totalDuration"
                echo "totalPassed = $totalPassed"
                echo "totalFailed = $totalFailed"
                echo "totalSuites = $totalSuites"
                echo "totalTests = $totalTests"
                echo "osName = $osName"
                echo "cypressVersion = $cypressVersion"
                echo "browserName = $browserName"
                echo "browserVersion = $browserVersion"

                # <<EOF -heredoc, uma forma de escrever blocos de texto multilinha no shell
                # Tudo que estiver entre <<EOF e EOF(pode ser qualquer palavra) será considerado texto literal
                status_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$(TEAMS_URL)" \
                  -H "Content-Type: application/json" \
                  -d @- <<EOF
                {
                  "type": "AdaptiveCard",
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "attachments": [
                    {
                      "contentType": "application/vnd.microsoft.card.adaptive",
                      "content": {
                        "type": "AdaptiveCard",
